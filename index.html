<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>踢腳板工程管理系統 - Pro v6.5.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    #print-area, .view-section { display: none; }
    .view-active { display: block; }
    
    .search-container { position: relative; }
    #clear-site-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-2px);
      cursor: pointer;
      color: #94a3b8;
    }
    #clear-site-btn:hover { color: #64748b; }

    @media print {
      body { background: white !important; color: black; }
      #app-interface, .no-print, #auth-overlay { display: none !important; }
      #print-area { display: block !important; padding: 10px; width: 100%; }
      .print-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
      .print-table th, .print-table td { border: 1px solid #333; padding: 6px 8px; text-align: center; }
      .print-table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
      .site-group-header { background-color: #eee !important; text-align: left !important; font-weight: bold; padding-left: 10px; -webkit-print-color-adjust: exact; }
      .subtotal-row { background-color: #fafafa !important; font-style: italic; font-size: 13px; }
      .report-header { text-align: center; margin-bottom: 20px; position: relative; }
      .report-title { font-size: 26px; font-weight: bold; border-bottom: 2px solid #000; display: inline-block; padding: 0 30px 5px 30px; margin-bottom: 10px; }
      .info-grid { display: grid; grid-template-columns: 1fr 1fr; text-align: left; margin-bottom: 10px; font-size: 14px; }
      .print-footer-thanks { text-align: center; margin-top: 30px; font-size: 16px; font-weight: bold; }
    }
    .sync-loader { animation: spin 1.5s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

<div id="auth-overlay" class="fixed inset-0 flex items-center justify-center bg-slate-900 z-[10000]">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-sm text-center">
        <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-lock text-indigo-600 text-2xl"></i>
        </div>
        <h2 class="text-xl font-bold mb-2">系統已鎖定</h2>
        <p class="text-slate-500 text-sm mb-6">請輸入管理密碼以繼續操作</p>
        <input type="password" id="sys-password" onkeydown="if(event.key==='Enter') checkPassword()" class="w-full border-2 border-slate-200 p-3 rounded-xl text-center text-2xl tracking-widest mb-4 focus:border-indigo-500 outline-none" placeholder="••••">
        <button onclick="checkPassword()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition shadow-lg">登入系統</button>
        <p id="auth-error" class="text-rose-500 text-xs mt-3 hidden">密碼錯誤，請重新輸入</p>
    </div>
</div>

<div id="loading-overlay" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-[9999] transition-opacity duration-500">
    <div class="relative"><i class="fas fa-circle-notch sync-loader text-6xl text-indigo-500"></i></div>
    <p class="mt-6 text-indigo-900 font-bold animate-pulse">系統資料同步中...</p>
</div>

<div id="app-interface">
  <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-40">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-3 cursor-pointer" onclick="switchView('main')">
        <div class="bg-indigo-600 p-2 rounded-lg"><i class="fas fa-hard-hat text-xl"></i></div>
        <h1 class="text-xl font-bold tracking-tight">踢腳板工程管理 <span class="text-indigo-400 text-xs font-normal border border-indigo-400 px-1 rounded ml-1">V6.5.1</span></h1>
      </div>
      <div class="flex items-center gap-2">
        <div id="cloud-status-tag" class="hidden sm:flex items-center bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 mr-1">
          <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 mr-2 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></div>
          <span id="status-text" class="text-[10px] font-bold text-slate-300 tracking-widest">系統連線中</span>
        </div>
        <button onclick="exportData()" id="btn-cloud" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 rounded-lg text-sm font-bold shadow-lg transition-all flex items-center">
          <i class="fas fa-cloud-upload-alt mr-2"></i>備份
        </button>
        <button onclick="switchView('client-mgmt')" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-sm font-bold transition">
          <i class="fas fa-users-cog mr-2"></i>客戶管理
        </button>
        <button onclick="openRecordModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg transition flex items-center">
            <i class="fas fa-plus mr-2"></i>新增紀錄
        </button>
      </div>
    </div>
  </header>

  <main class="container mx-auto p-4 lg:p-6">
    <section id="view-main" class="view-section view-active">
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4">
            <div class="space-y-1"><label class="text-xs font-bold text-slate-500">開始日期</label><input type="date" id="filter-start" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-slate-500">結束日期</label><input type="date" id="filter-end" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-slate-500">選擇客戶</label><select id="filter-client" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm" onchange="updateFilterStaffs()"></select></div>
            <div class="space-y-1"><label class="text-xs font-bold text-slate-500">工務</label><select id="filter-staff" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm"></select></div>
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-500">工地名稱</label>
              <div class="search-container">
                <input type="text" id="filter-site" placeholder="搜尋工地" class="w-full bg-slate-50 border-slate-200 p-2.5 pr-8 rounded-xl text-sm" oninput="toggleClearBtn()">
                <i id="clear-site-btn" class="fas fa-times-circle hidden" onclick="clearSiteFilter()"></i>
              </div>
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-500">款項狀態</label>
                <select id="filter-status" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm">
                    <option value="">全部</option>
                    <option value="not_invoiced">未請款</option>
                    <option value="invoiced">已請款</option>
                    <option value="not_paid">未收款</option>
                    <option value="paid">已入帳</option>
                </select>
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4 border-t pt-4">
            <button onclick="renderRecords()" class="w-full bg-slate-800 text-white p-2.5 rounded-xl text-sm hover:bg-slate-700 font-bold transition">查詢</button>
            <div class="relative group">
              <button onclick="togglePrintMenu()" class="w-full bg-indigo-600 text-white p-2.5 rounded-xl text-sm hover:bg-indigo-500 font-bold transition">列印選單</button>
              <div id="print-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-2xl border z-50 overflow-hidden">
                <button onclick="executePrint('report')" class="w-full text-left px-4 py-3 text-sm hover:bg-indigo-50 border-b">工程明細</button>
                <button onclick="executePrint('quantity')" class="w-full text-left px-4 py-3 text-sm hover:bg-indigo-50 border-b">工程數量</button>
                <button onclick="executePrint('invoice')" class="w-full text-left px-4 py-3 text-sm hover:bg-indigo-50">請款單</button>
              </div>
            </div>
          </div>
        </section>

        <section class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
          <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-indigo-500">
            <div class="text-xs font-bold text-slate-400">施工總量(M)</div>
            <div class="text-xl font-black text-slate-800 mt-1" id="stat-qty">0</div>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-slate-500">
            <div class="text-xs font-bold text-slate-400">工程總額</div>
            <div class="text-xl font-black text-slate-800 mt-1">$<span id="stat-total">0</span></div>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-500">
            <div class="text-xs font-bold text-slate-400">已請款</div>
            <div class="text-xl font-black text-blue-600 mt-1">$<span id="stat-invoiced">0</span></div>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-amber-500">
            <div class="text-xs font-bold text-slate-400">預收金額</div>
            <div class="text-xl font-black text-amber-600 mt-1">$<span id="stat-prepaid">0</span></div>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-emerald-500">
            <div class="text-xs font-bold text-slate-400">應收帳款(總)</div>
            <div class="text-xl font-black text-emerald-600 mt-1">$<span id="stat-receivable">0</span></div>
          </div>
          <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-rose-500">
            <div class="text-xs font-bold text-slate-400">待收金額</div>
            <div class="text-xl font-black text-rose-600 mt-1">$<span id="stat-unpaid">0</span></div>
          </div>
        </section>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
              <thead class="bg-slate-50 border-b">
                <tr>
                  <th class="p-4">日期</th>
                  <th class="p-4">工地 / 客戶 (工務)</th>
                  <th class="p-4">項目 / 備註</th>
                  <th class="p-4 text-right">數量/單價</th>
                  <th class="p-4 text-right">合計/預收</th>
                  <th class="p-4 text-center">狀態</th>
                  <th class="p-4 text-center">管理</th>
                </tr>
              </thead>
              <tbody id="record-list" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
    </section>

    <section id="view-client-mgmt" class="view-section">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold flex items-center"><i class="fas fa-address-book mr-3 text-indigo-600"></i>客戶與工務清單</h2>
            <button onclick="openClientModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition flex items-center">
                <i class="fas fa-plus-circle mr-2"></i>新增客戶
            </button>
        </div>
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4">客戶名稱</th>
                        <th class="p-4">統編/電話</th>
                        <th class="p-4">負責工務</th>
                        <th class="p-4 text-center">管理</th>
                    </tr>
                </thead>
                <tbody id="client-list-table" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
        <div class="mt-6 text-center">
            <button onclick="switchView('main')" class="text-slate-500 hover:text-indigo-600 font-bold transition">
                <i class="fas fa-arrow-left mr-2"></i>返回工程紀錄
            </button>
        </div>
    </section>
  </main>
</div>

<div id="record-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white p-8 rounded-2xl w-full max-w-2xl shadow-2xl">
      <h3 class="text-xl font-bold mb-6">紀錄編輯</h3>
      <form id="record-form" class="space-y-4">
        <input type="hidden" id="edit-id">
        <div class="grid grid-cols-2 gap-4">
          <input type="date" id="r-date" class="border p-2.5 rounded-xl text-sm" required>
          <select id="r-client" class="border p-2.5 rounded-xl text-sm" onchange="syncStaffDropdown()" required></select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <select id="r-staff" class="border p-2.5 rounded-xl text-sm"></select>
          <input type="text" id="r-site" placeholder="工地名稱" class="border p-2.5 rounded-xl text-sm" required>
        </div>
        <div class="grid grid-cols-12 gap-2 items-end">
          <div class="col-span-5 sm:col-span-4">
            <label class="text-[10px] text-slate-400 pl-1">項目</label>
            <select id="r-type" class="w-full border p-2.5 rounded-xl text-sm">
                <option value="上牆踢腳板">上牆踢腳板</option>
                <option value="PVC發泡踢腳板">PVC發泡踢腳板</option>
                <option value="塑合木踢腳板">塑合木踢腳板</option>
                <option value="牆毯收邊條">牆毯收邊條</option>
                <option value="階梯踢腳">階梯踢腳</option>
                <option value="點工">點工</option>
                <option value="油資">油資</option>
                <option value="住宿">住宿</option>
                <option value="其他">其他</option>
            </select>
          </div>
          <div class="col-span-2 sm:col-span-2">
            <label class="text-[10px] text-slate-400 pl-1">數量</label>
            <input type="number" id="r-qty" step="0.01" placeholder="0" class="w-full border p-2.5 rounded-xl text-sm" oninput="calcModalTotal()" required>
          </div>
          <div class="col-span-2 sm:col-span-3">
            <label class="text-[10px] text-slate-400 pl-1">單價</label>
            <input type="number" id="r-price" step="1" placeholder="0" class="w-full border p-2.5 rounded-xl text-sm" oninput="calcModalTotal()" required>
          </div>
          <div class="col-span-3 sm:col-span-3">
            <label class="text-[10px] text-slate-400 pl-1">合計金額</label>
            <input type="text" id="r-auto-total" class="w-full border p-2.5 rounded-xl text-sm bg-slate-50 font-bold text-indigo-600" readonly placeholder="$0">
          </div>
        </div>
        <div class="grid grid-cols-1 gap-2">
            <input type="number" id="r-prepaid" step="1" placeholder="預收金額" class="w-full border p-2.5 rounded-xl text-sm bg-amber-50">
        </div>
        <input type="text" id="r-note" placeholder="備註事項" class="w-full border p-2.5 rounded-xl text-sm">
        <div class="flex gap-4">
          <label class="flex-1 border p-2 rounded-xl text-center cursor-pointer"><input type="checkbox" id="r-invoiced"> 已請款</label>
          <label class="flex-1 border p-2 rounded-xl text-center cursor-pointer"><input type="checkbox" id="r-paid"> 已入帳</label>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-3 pt-2">
          <button type="button" onclick="closeModal('record-modal')" class="flex-1 bg-slate-100 py-3 rounded-xl text-sm font-bold text-slate-600">取消</button>
          <button type="button" onclick="saveRecord(true)" class="flex-[1.5] bg-indigo-500 text-white py-3 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-600 transition-colors">儲存並新增下一項</button>
          <button type="button" onclick="saveRecord(false)" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg hover:bg-emerald-700 transition-colors">儲存</button>
        </div>
      </form>
    </div>
</div>

<div id="client-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <h3 class="text-xl font-bold mb-6" id="client-modal-title">新增客戶</h3>
        <div class="space-y-4">
            <input type="hidden" id="c-edit-idx">
            <div>
                <label class="text-xs font-bold text-slate-500">客戶名稱</label>
                <input type="text" id="c-name" class="w-full border p-2.5 rounded-xl text-sm" placeholder="例如：某某設計公司">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-slate-500">統編 (可選)</label>
                    <input type="text" id="c-tax" class="w-full border p-2.5 rounded-xl text-sm">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500">電話 (可選)</label>
                    <input type="text" id="c-phone" class="w-full border p-2.5 rounded-xl text-sm">
                </div>
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500">工務人員 (多位請用逗號隔開)</label>
                <input type="text" id="c-staffs" class="w-full border p-2.5 rounded-xl text-sm" placeholder="阿明, 小華">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500">公司地址 (可選)</label>
                <input type="text" id="c-address" class="w-full border p-2.5 rounded-xl text-sm">
            </div>
            <div class="flex gap-3 pt-4">
                <button onclick="closeModal('client-modal')" class="flex-1 bg-slate-100 py-3 rounded-xl text-sm font-bold">取消</button>
                <button onclick="saveClient()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg hover:bg-indigo-700">儲存客戶</button>
            </div>
        </div>
    </div>
</div>

<div id="print-area">
  <div class="report-header">
      <div id="p-print-date" style="position: absolute; right: 0; top: 0; font-size: 10px; color: #666;"></div>
      <div class="report-title" id="p-title">工程數量</div>
      <div class="info-grid" id="p-info-header"></div>
  </div>
  <table class="print-table">
      <thead id="p-thead"></thead>
      <tbody id="p-tbody"></tbody>
  </table>
  <div id="p-footer-extra" class="mt-4 text-right font-bold pr-4 text-xl"></div>
  <div class="print-footer-thanks">感謝您的支持與合作</div>
</div>

<script>
  const cloudUrl = "https://script.google.com/macros/s/AKfycbz1lPnQ8R4ouOpKLfi4kt28vJeEy3ziWRkEdWAyn9j13cV6QCyGZ7g7GaQB5nO4E-Y6/exec"; 
  let records = []; let clients = [];

  function switchView(view) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('view-active'));
    document.getElementById('view-' + view).classList.add('view-active');
    if(view === 'client-mgmt') renderClientList();
  }

  function toggleClearBtn() { const input = document.getElementById('filter-site'); const btn = document.getElementById('clear-site-btn'); if (input.value.length > 0) { btn.classList.remove('hidden'); } else { btn.classList.add('hidden'); } }
  function clearSiteFilter() { document.getElementById('filter-site').value = ''; document.getElementById('clear-site-btn').classList.add('hidden'); renderRecords(); }
  function checkPassword() { const pwd = document.getElementById('sys-password').value; if (pwd === "888") { document.getElementById('auth-overlay').classList.add('hidden'); sessionStorage.setItem('is_authenticated', 'true'); } else { document.getElementById('auth-error').classList.remove('hidden'); } }
  function calcModalTotal() { const q = parseFloat(document.getElementById('r-qty').value) || 0; const p = parseFloat(document.getElementById('r-price').value) || 0; document.getElementById('r-auto-total').value = "$" + Math.round(q * p).toLocaleString(); }

  window.onload = async function() {
    if (sessionStorage.getItem('is_authenticated') === 'true') document.getElementById('auth-overlay').classList.add('hidden');
    const today = new Date();
    document.getElementById('filter-start').value = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().slice(0, 10);
    document.getElementById('filter-end').value = today.toISOString().slice(0, 10);
    try {
        const response = await fetch(cloudUrl);
        const data = await response.json();
        if(data.records) { records = data.records; clients = data.clients || []; saveLocal(); updateCloudStatus('online'); } else { loadLocal(); updateCloudStatus('offline'); }
    } catch (e) { loadLocal(); updateCloudStatus('error'); }
    finally { document.getElementById('loading-overlay').classList.add('hidden'); updateClientSelects(); renderRecords(); }
  };

  // --- 客戶管理邏輯 ---
  function renderClientList() {
    const tbody = document.getElementById('client-list-table');
    tbody.innerHTML = clients.map((c, idx) => `
        <tr>
            <td class="p-4 font-bold text-indigo-700">${c.name}</td>
            <td class="p-4 text-xs text-slate-500">${c.tax || '-'}<br>${c.phone || '-'}</td>
            <td class="p-4">
                <div class="flex flex-wrap gap-1">
                    ${(Array.isArray(c.staffs) ? c.staffs : (c.staffs ? c.staffs.split(',') : [])).map(s => `<span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[10px]">${s.trim()}</span>`).join('')}
                </div>
            </td>
            <td class="p-4 text-center">
                <button onclick="openClientModal(${idx})" class="text-indigo-600 mr-3"><i class="fas fa-edit"></i></button>
                <button onclick="delClient(${idx})" class="text-slate-300 hover:text-rose-500"><i class="fas fa-trash-alt"></i></button>
            </td>
        </tr>
    `).join('');
  }

  function openClientModal(idx = null) {
    document.getElementById('c-edit-idx').value = idx !== null ? idx : '';
    document.getElementById('client-modal-title').innerText = idx !== null ? '編輯客戶' : '新增客戶';
    if(idx !== null) {
        const c = clients[idx];
        document.getElementById('c-name').value = c.name;
        document.getElementById('c-tax').value = c.tax || '';
        document.getElementById('c-phone').value = c.phone || '';
        document.getElementById('c-staffs').value = Array.isArray(c.staffs) ? c.staffs.join(', ') : c.staffs;
        document.getElementById('c-address').value = c.address || '';
    } else {
        document.getElementById('c-name').value = ''; document.getElementById('c-tax').value = ''; document.getElementById('c-phone').value = ''; document.getElementById('c-staffs').value = ''; document.getElementById('c-address').value = '';
    }
    document.getElementById('client-modal').classList.remove('hidden');
  }

  function saveClient() {
    const name = document.getElementById('c-name').value.trim();
    const idx = document.getElementById('c-edit-idx').value;
    if(!name) return alert("請輸入客戶名稱");
    const newClient = { name, tax: document.getElementById('c-tax').value, phone: document.getElementById('c-phone').value, staffs: document.getElementById('c-staffs').value.split(',').map(s => s.trim()).filter(s => s), address: document.getElementById('c-address').value };
    if(idx !== '') clients[idx] = newClient; else clients.push(newClient);
    save(); updateClientSelects(); renderClientList(); closeModal('client-modal');
  }

  function delClient(idx) { if(confirm(`確定刪除客戶「${clients[idx].name}」？`)) { clients.splice(idx, 1); save(); updateClientSelects(); renderClientList(); } }

  // --- 工程紀錄邏輯 ---
  function getFilteredRecords() {
    const startD = document.getElementById('filter-start').value;
    const endD = document.getElementById('filter-end').value;
    const c = document.getElementById('filter-client').value;
    const staff = document.getElementById('filter-staff').value;
    const site = document.getElementById('filter-site').value.trim().toLowerCase();
    const statusF = document.getElementById('filter-status').value;
    return records.filter(r => {
        const matchBase = (!startD || r.date >= startD) && (!endD || r.date <= endD) && (!c || r.client === c) && (!staff || r.staff === staff) && (!site || (r.site && r.site.toLowerCase().includes(site)));
        let matchStatus = true;
        if (statusF === 'paid') matchStatus = r.paid; 
        else if (statusF === 'invoiced') matchStatus = r.invoiced; 
        else if (statusF === 'not_invoiced') matchStatus = (!r.invoiced && !r.paid); 
        else if (statusF === 'not_paid') matchStatus = !r.paid;
        return matchBase && matchStatus;
    }).sort((a,b) => new Date(a.date) - new Date(b.date));
  }

  function renderRecords() {
    const filtered = [...getFilteredRecords()].reverse();
    let tQty = 0, tAmt = 0, iAmt = 0, pAmt = 0, uAmt = 0, rAmt = 0;
    const excludeFromQty = ["點工", "油資", "住宿", "階梯踢腳", "其他"];
    document.getElementById('record-list').innerHTML = filtered.map(r => {
        const isExcluded = excludeFromQty.some(key => r.type.includes(key));
        if (!isExcluded) tQty += (r.qty || 0); tAmt += (r.total || 0); pAmt += (r.prepaid || 0);
        if (r.invoiced) iAmt += (r.total || 0);
        if (!r.paid) { uAmt += (r.total - (r.prepaid || 0)); rAmt += (r.total || 0); }
        return `<tr><td class="p-4 text-xs">${r.date}</td><td class="p-4"><div class="font-bold">${r.site}</div><div class="text-[10px] text-slate-500">${r.client} (${r.staff || '未設工務'})</div></td><td class="p-4"><div class="text-sm font-medium text-indigo-600">${r.type}${r.note ? ' / <span class="text-rose-500 font-bold">' + r.note + '</span>' : ''}</div></td><td class="p-4 text-right"><span class="font-bold">${r.qty}</span><br><span class="text-xs text-slate-400">$${r.price}</span></td><td class="p-4 text-right font-bold">$${r.total.toLocaleString()}</td><td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${r.paid ? 'bg-emerald-100 text-emerald-600' : (r.invoiced ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500')}">${r.paid ? '已入帳' : (r.invoiced ? '已請款' : '待收')}</span></td><td class="p-4 text-center"><button onclick="editRec('${r.id}')" class="text-indigo-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="delRec('${r.id}')" class="text-slate-300 hover:text-rose-500"><i class="fas fa-trash-alt"></i></button></td></tr>`;
    }).join('');
    document.getElementById('stat-qty').innerText = Math.floor(tQty).toLocaleString(); document.getElementById('stat-total').innerText = tAmt.toLocaleString(); document.getElementById('stat-invoiced').innerText = iAmt.toLocaleString(); document.getElementById('stat-prepaid').innerText = pAmt.toLocaleString(); document.getElementById('stat-receivable').innerText = rAmt.toLocaleString(); document.getElementById('stat-unpaid').innerText = uAmt.toLocaleString();
  }

  function executePrint(mode) {
    document.getElementById('print-dropdown').classList.add('hidden');
    const filtered = getFilteredRecords(); 
    const selectedClientName = document.getElementById('filter-client').value;
    let clientName = selectedClientName || "所有客戶";
    const staffName = document.getElementById('filter-staff').value;
    if (staffName) clientName = `${clientName} / ${staffName}`;
    const startD = document.getElementById('filter-start').value;
    const endD = document.getElementById('filter-end').value;

    if (mode === 'invoice') {
        if (!selectedClientName) return alert("請先選擇特定「客戶」再產生請款單");
        // 修正點：從客戶清單中搜尋完整的客戶物件，確保包含統編 (tax)
        const fullClientInfo = clients.find(cl => cl.name === selectedClientName) || { name: selectedClientName };
        sessionStorage.setItem('INVOICE_DATA', JSON.stringify({ 
            workRange: `${startD} ～ ${endD}`, 
            clientInfo: fullClientInfo, 
            items: filtered 
        }));
        window.open('工程請款單.html', '_blank'); 
        return;
    }

    document.getElementById('p-print-date').innerText = `列印日期：${new Date().toLocaleString()}`;
    document.getElementById('p-title').innerText = (mode === 'quantity') ? "工程數量單" : "工程明細報表";
    document.getElementById('p-info-header').innerHTML = `<div>客戶名稱：${clientName}</div><div style="text-align:right">查詢區間：${startD} ～ ${endD}</div>`;
    const thead = document.getElementById('p-thead'); const tbody = document.getElementById('p-tbody'); const tfoot = document.getElementById('p-footer-extra');
    const grouped = filtered.reduce((acc, r) => { if (!acc[r.site]) acc[r.site] = []; acc[r.site].push(r); return acc; }, {});
    let html = ""; let grandTotalAmt = 0; let grandTotalQty = 0;
    const laborItems = ["點工"]; const stairItems = ["階梯踢腳"]; const moneyItems = ["油資", "住宿"]; const otherItems = ["其他"];

    if (mode === 'quantity') {
        thead.innerHTML = `<tr><th width="15%">日期</th><th width="60%">項目 / 備註</th><th width="25%">數量/金額</th></tr>`;
        for (const site in grouped) {
            html += `<tr><td colspan="3" class="site-group-header">工地：${site}</td></tr>`;
            let siteStats = {}; grouped[site].forEach(r => {
                let displayVal = "";
                if (moneyItems.concat(otherItems).some(k => r.type.includes(k))) displayVal = `$${r.total.toLocaleString()}`; 
                else if (laborItems.some(k => r.type.includes(k))) displayVal = `${r.qty} 工`;
                else if (stairItems.some(k => r.type.includes(k))) displayVal = `${r.qty} 階`;
                else { displayVal = `${r.qty}`; grandTotalQty += r.qty; }
                html += `<tr><td>${r.date}</td><td style="text-align:left">${r.type}${r.note ? ' ('+r.note+')' : ''}</td><td>${displayVal}</td></tr>`;
                if (!siteStats[r.type]) siteStats[r.type] = { qty: 0, amt: 0 }; siteStats[r.type].qty += r.qty; siteStats[r.type].amt += r.total;
            });
            let statStrings = []; for (let type in siteStats) {
                const s = siteStats[type];
                if (moneyItems.concat(otherItems).some(k => type.includes(k))) statStrings.push(`${type}：$${s.amt.toLocaleString()}`);
                else if (laborItems.some(k => type.includes(k))) statStrings.push(`${type}：${s.qty.toFixed(2)} 工`);
                else if (stairItems.some(k => type.includes(k))) statStrings.push(`${type}：${s.qty.toFixed(2)} 階`);
                else statStrings.push(`${type}：${s.qty.toFixed(2)} M`);
            }
            html += `<tr class="subtotal-row"><td colspan="3" style="text-align:left; padding-left: 20px;">● 工地小計 >> ${statStrings.join(' ｜ ')}</td></tr>`;
        }
        tbody.innerHTML = html; tfoot.innerHTML = `總計施工數量：${grandTotalQty.toFixed(2)} M`;
    } else {
        thead.innerHTML = `<tr><th width="15%">日期</th><th width="60%">項目 / 備註</th><th width="25%">金額</th></tr>`;
        for (const site in grouped) {
            html += `<tr><td colspan="3" class="site-group-header">工地：${site}</td></tr>`;
            let siteAmt = 0; grouped[site].forEach(r => {
                let detail = otherItems.concat(moneyItems).some(k => r.type.includes(k)) ? `<span class="text-indigo-600 font-bold">${r.type}</span>${r.note ? ' ('+r.note+')' : ''}` : `${r.type}${r.note ? ' ('+r.note+')' : ''} <small style="color:#888">(${r.qty}${laborItems.some(k => r.type.includes(k)) ? "工" : (stairItems.some(k => r.type.includes(k)) ? "階" : "M")} x ${r.price})</small>`;
                html += `<tr><td>${r.date}</td><td style="text-align:left">${detail}</td><td>$${r.total.toLocaleString()}</td></tr>`;
                siteAmt += r.total; grandTotalAmt += r.total;
            });
            html += `<tr class="subtotal-row"><td colspan="2" style="text-align:right">工地金額小計：</td><td>$${siteAmt.toLocaleString()}</td></tr>`;
        }
        tbody.innerHTML = html; tfoot.innerHTML = `全案工程總計：$${grandTotalAmt.toLocaleString()}`;
    }
    window.print();
  }

  function updateClientSelects() { 
    const html = clients.map(c => `<option value="${c.name}">${c.name}</option>`).join(''); 
    document.getElementById('filter-client').innerHTML = '<option value="">所有客戶</option>' + html; 
    document.getElementById('r-client').innerHTML = html; syncStaffDropdown(); 
  }

  function syncStaffDropdown() { 
    const rClientVal = document.getElementById('r-client').value; const c = clients.find(cl => cl.name === rClientVal); 
    if (c && c.staffs) { 
        const staffs = Array.isArray(c.staffs) ? c.staffs : c.staffs.split(',').map(s => s.trim()); 
        document.getElementById('r-staff').innerHTML = staffs.map(s => `<option value="${s}">${s}</option>`).join(''); 
    } else { document.getElementById('r-staff').innerHTML = ''; } 
  }

  function updateFilterStaffs() { 
    const cName = document.getElementById('filter-client').value; const c = clients.find(cl => cl.name === cName); const staffSel = document.getElementById('filter-staff'); 
    if (c && c.staffs) { 
        const staffs = Array.isArray(c.staffs) ? c.staffs : c.staffs.split(',').map(s => s.trim()); 
        staffSel.innerHTML = '<option value="">所有工務</option>' + staffs.map(s => `<option value="${s}">${s}</option>`).join(''); 
    } else { staffSel.innerHTML = '<option value="">所有工務</option>'; } 
  }

  function togglePrintMenu() { document.getElementById('print-dropdown').classList.toggle('hidden'); }
  async function exportData() { const btn = document.getElementById('btn-cloud'); btn.disabled = true; updateCloudStatus('syncing'); try { await fetch(cloudUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({records, clients}) }); setTimeout(() => { updateCloudStatus('online'); alert("備份成功！"); btn.disabled = false; }, 800); } catch (e) { updateCloudStatus('error'); alert("備份失敗"); btn.disabled = false; } }
  function updateCloudStatus(status) { const dot = document.getElementById('status-dot'); const txt = document.getElementById('status-text'); if(!dot || !txt) return; if(status==='online'){ dot.className="w-2 h-2 rounded-full bg-emerald-500 mr-2"; txt.innerText="雲端已連線"; } else if(status==='offline'){ dot.className="w-2 h-2 rounded-full bg-slate-500 mr-2"; txt.innerText="離線模式"; } else if(status==='syncing'){ dot.className="w-2 h-2 rounded-full bg-amber-500 animate-pulse mr-2"; txt.innerText="備份中..."; } else { dot.className="w-2 h-2 rounded-full bg-rose-500 mr-2"; txt.innerText="同步異常"; } }
  function loadLocal() { records = JSON.parse(localStorage.getItem('SKIRTING_V6')) || []; clients = JSON.parse(localStorage.getItem('CLIENT_V6')) || []; }
  function saveLocal() { localStorage.setItem('SKIRTING_V6', JSON.stringify(records)); localStorage.setItem('CLIENT_V6', JSON.stringify(clients)); }
  function save() { saveLocal(); fetch(cloudUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({records, clients}) }); }
  function openRecordModal(){ document.getElementById('record-form').reset(); document.getElementById('edit-id').value = ''; document.getElementById('r-date').valueAsDate = new Date(); calcModalTotal(); document.getElementById('record-modal').classList.remove('hidden'); }
  function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
  function saveRecord(keepOpen) { const id = document.getElementById('edit-id').value || Date.now().toString(); const q = parseFloat(document.getElementById('r-qty').value) || 0; const p = parseFloat(document.getElementById('r-price').value) || 0; if(!document.getElementById('r-site').value) return alert("請輸入工地名稱"); const rec = { id, date: document.getElementById('r-date').value, client: document.getElementById('r-client').value, staff: document.getElementById('r-staff').value, site: document.getElementById('r-site').value, type: document.getElementById('r-type').value, qty: q, price: p, total: Math.round(q * p), prepaid: parseFloat(document.getElementById('r-prepaid').value)||0, invoiced: document.getElementById('r-invoiced').checked, paid: document.getElementById('r-paid').checked, note: document.getElementById('r-note').value }; const idx = records.findIndex(r => r.id === id); if(idx > -1) records[idx] = rec; else records.push(rec); save(); renderRecords(); if (keepOpen) { document.getElementById('edit-id').value = ''; document.getElementById('r-qty').value = ''; document.getElementById('r-note').value = ''; document.getElementById('r-prepaid').value = ''; calcModalTotal(); document.getElementById('r-qty').focus(); } else { closeModal('record-modal'); } }
  function editRec(id){ const r = records.find(r => r.id === id); document.getElementById('edit-id').value = r.id; document.getElementById('r-date').value = r.date; document.getElementById('r-client').value = r.client; syncStaffDropdown(); document.getElementById('r-staff').value = r.staff || ''; document.getElementById('r-site').value = r.site; document.getElementById('r-type').value = r.type; document.getElementById('r-qty').value = r.qty; document.getElementById('r-price').value = r.price; document.getElementById('r-prepaid').value = r.prepaid || 0; document.getElementById('r-invoiced').checked = r.invoiced || false; document.getElementById('r-paid').checked = r.paid || false; document.getElementById('r-note').value = r.note || ''; calcModalTotal(); document.getElementById('record-modal').classList.remove('hidden'); }
  function delRec(id){ if(confirm('確定刪除？')){ records = records.filter(r => r.id !== id); save(); renderRecords(); } }
</script>
</body>
