<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>踢腳板工程管理系統 - Pro v6.2.2 (Modified)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    
    #print-area { display: none; }
    @media print {
      body { background: white !important; color: black; }
      #app-interface, .no-print { display: none !important; }
      #print-area { display: block !important; padding: 10px; }
      .print-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
      .print-table th, .print-table td { border: 1px solid #333; padding: 8px; text-align: center; }
      .print-table th { background-color: #f8f9fa !important; -webkit-print-color-adjust: exact; }
      .report-header { text-align: center; margin-bottom: 25px; }
      .report-title { font-size: 28px; font-weight: bold; border-bottom: 3px double #000; display: inline-block; padding: 0 40px 5px 40px; margin-bottom: 5px; }
    }

    .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    .status-unpaid { color: #dc2626; background: #fee2e2; padding: 2px 8px; border-radius: 99px; font-weight: bold; font-size: 12px; }
    .status-paid { color: #059669; background: #d1fae5; padding: 2px 8px; border-radius: 99px; font-weight: bold; font-size: 12px; }
    .status-invoiced { color: #2563eb; background: #dbeafe; padding: 2px 8px; border-radius: 99px; font-weight: bold; font-size: 12px; }
    .sync-loader { animation: spin 1.5s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #818cf8; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

<div id="loading-overlay" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-[9999] transition-opacity duration-500">
    <div class="relative">
        <i class="fas fa-circle-notch sync-loader text-6xl text-indigo-500"></i>
        <i class="fas fa-hammer absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-xl text-indigo-700"></i>
    </div>
    <p class="mt-6 text-indigo-900 font-bold tracking-widest animate-pulse">系統資料同步中...</p>
</div>

<div id="app-interface">
  <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-40">
    <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-600 p-2 rounded-lg">
            <i class="fas fa-hard-hat text-xl"></i>
        </div>
        <h1 class="text-xl font-bold tracking-tight">踢腳板工程管理 <span class="text-indigo-400 text-xs font-normal border border-indigo-400 px-1 rounded ml-1">V6.2.2</span></h1>
      </div>
      
      <div class="flex items-center gap-2 mt-2 sm:mt-0">
        <div class="hidden md:flex items-center bg-slate-800 rounded-lg px-3 py-1 mr-2 border border-slate-700">
            <span class="text-xs text-slate-400 mr-2">雲端狀態:</span>
            <span id="sync-status" class="text-xs text-green-400 font-bold">● 連線中</span>
        </div>
        <button onclick="exportData()" id="btn-cloud" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 rounded-lg text-sm font-bold transition-all shadow-lg flex items-center">
          <i class="fas fa-cloud-upload-alt mr-2"></i>備份
        </button>
        <button onclick="openClientModal()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-sm font-bold transition">客戶資料</button>
        <button onclick="openRecordModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg transition flex items-center">
            <i class="fas fa-plus mr-2"></i>新增紀錄
        </button>
      </div>
    </div>
  </header>

  <main class="container mx-auto p-4 lg:p-6">
    <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-500 ml-1"><i class="fas fa-calendar-alt mr-1"></i>月份篩選</label>
          <input type="month" id="filter-month" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 transition-all">
        </div>
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-500 ml-1"><i class="fas fa-user-tie mr-1"></i>選擇客戶</label>
          <select id="filter-client" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500" onchange="updateFilterStaffs(); renderRecords();"></select>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-500 ml-1"><i class="fas fa-tools mr-1"></i>工務負責</label>
          <select id="filter-staff" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500"></select>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-bold text-slate-500 ml-1"><i class="fas fa-hand-holding-usd mr-1"></i>款項狀態</label>
          <select id="filter-status" class="w-full bg-slate-50 border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
            <option value="">全部狀態</option>
            <option value="not_invoiced">❌ 未請款</option>
            <option value="invoiced_unpaid">⏳ 已請款(待領)</option>
            <option value="paid">✅ 已入帳</option>
          </select>
        </div>
        <div class="flex gap-2">
          <button onclick="preparePrint('report')" class="flex-1 bg-slate-800 text-white p-2.5 rounded-xl text-sm hover:bg-slate-700 font-bold transition shadow-md">報表列印</button>
          <button onclick="preparePrint('invoice')" class="flex-1 bg-indigo-600 text-white p-2.5 rounded-xl text-sm hover:bg-indigo-500 font-bold transition shadow-md">請款單</button>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-indigo-500 flex justify-between items-center group hover:shadow-md transition">
        <div>
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">施工總長</div>
            <div class="text-2xl font-black text-slate-800 mt-1"><span id="stat-qty">0</span> <small class="text-slate-400 text-sm font-medium">M</small></div>
        </div>
        <div class="bg-indigo-50 p-2 rounded-full text-indigo-500 group-hover:scale-110 transition"><i class="fas fa-ruler-combined text-xl"></i></div>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-slate-500 flex justify-between items-center group hover:shadow-md transition">
        <div>
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">工程總額</div>
            <div class="text-2xl font-black text-slate-800 mt-1"><small class="text-slate-400 text-sm mr-1">$</small><span id="stat-total">0</span></div>
        </div>
        <div class="bg-slate-50 p-2 rounded-full text-slate-500 group-hover:scale-110 transition"><i class="fas fa-coins text-xl"></i></div>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-blue-500 flex justify-between items-center group hover:shadow-md transition">
        <div>
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">已請款總額</div>
            <div class="text-2xl font-black text-blue-600 mt-1"><small class="text-blue-300 text-sm mr-1">$</small><span id="stat-invoiced">0</span></div>
        </div>
        <div class="bg-blue-50 p-2 rounded-full text-blue-500 group-hover:scale-110 transition"><i class="fas fa-file-invoice-dollar text-xl"></i></div>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-rose-500 flex justify-between items-center group hover:shadow-md transition">
        <div>
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">尚未回收金額</div>
            <div class="text-2xl font-black text-rose-600 mt-1"><small class="text-rose-300 text-sm mr-1">$</small><span id="stat-unpaid">0</span></div>
        </div>
        <div class="bg-rose-50 p-2 rounded-full text-rose-500 group-hover:scale-110 transition"><i class="fas fa-exclamation-circle text-xl"></i></div>
      </div>
    </section>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
              <th class="p-4 font-bold text-slate-600">日期</th>
              <th class="p-4 font-bold text-slate-600">工地資訊</th>
              <th class="p-4 font-bold text-slate-600">施工項目</th>
              <th class="p-4 font-bold text-slate-600 text-right">數量/單價</th>
              <th class="p-4 font-bold text-slate-600 text-right">合計</th>
              <th class="p-4 font-bold text-slate-600 text-center">狀態</th>
              <th class="p-4 font-bold text-slate-600 text-center">管理</th>
            </tr>
          </thead>
          <tbody id="record-list" class="divide-y divide-slate-100 text-slate-600"></tbody>
        </table>
      </div>
      <div id="no-data" class="hidden p-20 text-center">
          <i class="fas fa-folder-open text-5xl text-slate-200 mb-4"></i>
          <p class="text-slate-400">目前沒有符合條件的紀錄</p>
      </div>
    </div>
  </main>
</div>

<div id="print-area">
  <div class="report-header">
    <div class="report-title" id="p-title">工程明細報表</div>
    <p style="margin-top: 10px; font-weight: bold;">請款日期：<span id="p-today"></span></p>
  </div>
  <div id="p-info" style="margin-bottom: 20px; border: 1px solid #eee; padding: 15px; border-radius: 8px;"></div>
  <table class="print-table">
    <thead id="p-thead"></thead>
    <tbody id="p-tbody"></tbody>
    <tfoot id="p-tfoot" class="font-bold"></tfoot>
  </table>
  <div id="p-footer-extra"></div>
</div>

<div id="client-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white p-8 rounded-2xl w-full max-w-xl shadow-2xl scale-in-center">
      <div class="flex justify-between items-center mb-6">
          <h3 class="text-xl font-bold flex items-center"><i class="fas fa-users-cog mr-2 text-indigo-500"></i>客戶資料管理</h3>
          <button onclick="closeModal('client-modal')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
      </div>
      
      <div class="grid grid-cols-2 gap-4 mb-6">
        <input type="hidden" id="edit-client-index" value="-1">
        <div class="col-span-2">
            <input type="text" id="new-client-name" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="客戶公司名稱 (必填)">
        </div>
        <input type="text" id="new-client-taxid" class="border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="統一編號">
        <input type="text" id="new-client-contact" class="border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="預設聯絡人">
        <input type="text" id="new-client-phone" class="border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="客戶電話">
        <input type="text" id="new-client-address" class="border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="客戶地址">
        <div class="col-span-2">
            <textarea id="new-client-staffs" rows="2" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" placeholder="工務名單 (多個請用逗號隔開)"></textarea>
        </div>
        <button onclick="addClient()" id="btn-save-client" class="col-span-2 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition">儲存客戶資料</button>
      </div>

      <div class="max-h-60 overflow-y-auto border border-slate-100 rounded-xl">
        <ul id="client-ui-list" class="divide-y divide-slate-50"></ul>
      </div>
      
      <div class="mt-4 flex justify-end gap-2">
          <input type="file" id="import-file" class="hidden" onchange="importData(this)">
          <button onclick="document.getElementById('import-file').click()" class="text-xs text-slate-400 hover:text-indigo-500 transition"><i class="fas fa-file-import mr-1"></i>匯入備份檔</button>
      </div>
    </div>
</div>

<div id="record-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-50 p-4">
  <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold flex items-center"><i class="fas fa-pen-nib mr-2 text-emerald-500"></i>施工紀錄編輯</h3>
        <button onclick="closeModal('record-modal')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
    </div>
    
    <form id="record-form" class="space-y-4">
      <input type="hidden" id="edit-id">
      <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">施作日期</label>
            <input type="date" id="r-date" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" required>
        </div>
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">客戶公司</label>
            <select id="r-client" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" onchange="syncStaffDropdown()" required></select>
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">工務代表</label>
            <select id="r-staff" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50"></select>
        </div>
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">工地名稱</label>
            <input type="text" id="r-site" placeholder="例：淡水吳先生" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" required>
        </div>
      </div>
      
      <div>
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">施工類型</label>
        <select id="r-type" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50">
            <option value="PVC發泡踢腳板">PVC發泡踢腳板</option>
            <option value="塑合木踢腳板">塑合木踢腳板</option>
            <option value="牆毯收邊條">牆毯收邊條</option>
            <option value="U型墊">U型墊</option>
            <option value="上牆踢腳板">上牆踢腳板</option>
            <option value="補工">補工</option>
            <option value="油資">油資</option>
            <option value="住宿">住宿</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">施工數量</label>
            <input type="number" id="r-qty" step="0.01" placeholder="數量" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" required>
        </div>
        <div>
            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">單價</label>
            <input type="number" id="r-price" step="1" placeholder="單價" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50" required>
        </div>
      </div>

      <div>
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">備注事項</label>
        <input type="text" id="r-note" placeholder="額外說明或備注" class="w-full border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 bg-slate-50">
      </div>

      <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 space-y-3">
        <div class="flex flex-col">
            <span class="text-[10px] font-bold text-indigo-400 uppercase">預估合計</span>
            <span class="text-xl font-black text-indigo-700">$ <span id="r-total-display">0</span></span>
        </div>
        <div class="flex gap-2">
            <label class="flex-1 flex items-center cursor-pointer bg-white px-3 py-2 rounded-lg shadow-sm border border-indigo-100">
                <input type="checkbox" id="r-invoiced" class="w-4 h-4 text-blue-600 rounded mr-2 focus:ring-blue-500">
                <span class="text-sm font-bold text-slate-600">已請款</span>
            </label>
            <label class="flex-1 flex items-center cursor-pointer bg-white px-3 py-2 rounded-lg shadow-sm border border-indigo-100">
                <input type="checkbox" id="r-paid" class="w-4 h-4 text-indigo-600 rounded mr-2 focus:ring-indigo-500">
                <span class="text-sm font-bold text-slate-600">已收款</span>
            </label>
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal('record-modal')" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold hover:bg-slate-200 transition">取消</button>
        <button type="submit" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 shadow-lg transition">儲存施工紀錄</button>
      </div>
    </form>
  </div>
</div>

<script>
  // --- 設定區 ---
  const cloudUrl = "https://script.google.com/macros/s/AKfycbz1lPnQ8R4ouOpKLfi4kt28vJeEy3ziWRkEdWAyn9j13cV6QCyGZ7g7GaQB5nO4E-Y6/exec"; 
  // --------------

  let records = [];
  let clients = [];

  window.onload = async function() {
    const today = new Date();
    document.getElementById('filter-month').value = today.toISOString().slice(0, 7);

    if(!cloudUrl.includes("exec")) {
        hideOverlay();
        alert("⚠️ 尚未設定雲端網址，目前使用本機模式");
        loadLocal();
        return;
    }

    try {
        const response = await fetch(cloudUrl);
        const data = await response.json();
        if(data.records && data.clients) {
            records = data.records;
            clients = data.clients;
            saveLocal();
            document.getElementById('sync-status').innerText = "● 雲端已同步";
        } else {
            loadLocal();
        }
    } catch (e) {
        console.warn("無法連接雲端", e);
        document.getElementById('sync-status').innerText = "● 離線模式";
        document.getElementById('sync-status').classList.replace('text-green-400', 'text-amber-400');
        loadLocal();
    } finally {
        hideOverlay();
        updateClientSelects();
        renderRecords();
    }
  };

  function hideOverlay() {
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('opacity-0');
    setTimeout(() => overlay.classList.add('hidden'), 500);
  }

  function loadLocal() {
    records = JSON.parse(localStorage.getItem('SKIRTING_V6')) || [];
    clients = JSON.parse(localStorage.getItem('CLIENT_V6')) || [{name: "預設客戶", taxId: "", contact: "", phone: "", address: "", staffs: []}];
  }

  function saveLocal() {
    localStorage.setItem('SKIRTING_V6', JSON.stringify(records)); 
    localStorage.setItem('CLIENT_V6', JSON.stringify(clients)); 
  }

  function save() {
    saveLocal();
    if(cloudUrl.includes("exec")) {
        fetch(cloudUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({records, clients}) });
    }
  }

  async function exportData() {
    const btn = document.getElementById('btn-cloud');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-sync sync-loader mr-2"></i>上傳中...';
    
    try {
        await fetch(cloudUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({records, clients}) });
        const blob = new Blob([JSON.stringify({records, clients}, null, 2)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `工程備份_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        alert("✅ 備份成功！雲端資料已同步並下載備份檔案。");
    } catch (e) {
        alert("❌ 同步失敗，請檢查網路連線");
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
  }

  function updateClientSelects() {
    const html = clients.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    document.getElementById('filter-client').innerHTML = '<option value="">所有客戶</option>' + html;
    document.getElementById('r-client').innerHTML = html;
    
    document.getElementById('client-ui-list').innerHTML = clients.map((c,i) => `
      <li class="p-4 hover:bg-slate-50 transition">
        <div class="flex justify-between items-start">
          <div class="flex-1">
            <span class="font-bold text-slate-800 text-base">${c.name}</span>
            <div class="text-[10px] text-slate-400 mt-0.5 uppercase tracking-widest font-bold">
                統編: ${c.taxId || '---'} | 電話: ${c.phone || '---'}
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="editClient(${i})" class="text-indigo-400 hover:text-indigo-600 p-2"><i class="fas fa-edit text-sm"></i></button>
            <button onclick="delClient(${i})" class="text-rose-300 hover:text-rose-500 p-2"><i class="fas fa-trash-alt text-sm"></i></button>
          </div>
        </div>
        <div class="mt-3 flex flex-wrap gap-1">
            ${(c.staffs || []).map(s => `<span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-md font-bold">${s}</span>`).join('') || '<span class="text-[10px] text-slate-300 italic">尚未設定工務</span>'}
        </div>
      </li>`).join('');
    syncStaffDropdown();
    updateFilterStaffs();
  }

  function updateFilterStaffs() {
    const clientName = document.getElementById('filter-client').value;
    const filterStaffSelect = document.getElementById('filter-staff');
    if (!clientName) { filterStaffSelect.innerHTML = '<option value="">請先選客戶</option>'; return; }
    const clientObj = clients.find(c => c.name === clientName);
    if (clientObj && clientObj.staffs && clientObj.staffs.length > 0) {
      filterStaffSelect.innerHTML = '<option value="">所有工務</option>' + clientObj.staffs.map(s => `<option value="${s}">${s}</option>`).join('');
    } else { filterStaffSelect.innerHTML = '<option value="">無工務資料</option>'; }
  }

  function syncStaffDropdown() {
    const clientName = document.getElementById('r-client').value;
    const clientObj = clients.find(c => c.name === clientName);
    const staffSelect = document.getElementById('r-staff');
    if (clientObj && clientObj.staffs && clientObj.staffs.length > 0) {
      staffSelect.innerHTML = clientObj.staffs.map(s => `<option value="${s}">${s}</option>`).join('');
    } else { staffSelect.innerHTML = '<option value="">無資料</option>'; }
  }

  function editClient(index) {
    const c = clients[index];
    document.getElementById('edit-client-index').value = index;
    document.getElementById('new-client-name').value = c.name;
    document.getElementById('new-client-taxid').value = c.taxId || '';
    document.getElementById('new-client-contact').value = c.contact || '';
    document.getElementById('new-client-phone').value = c.phone || '';
    document.getElementById('new-client-address').value = c.address || '';
    document.getElementById('new-client-staffs').value = (c.staffs || []).join(', ');
    
    document.getElementById('btn-save-client').innerText = "更新客戶資料";
    document.getElementById('btn-save-client').classList.replace('bg-indigo-600', 'bg-amber-600');
  }

  function addClient(){
    const name = document.getElementById('new-client-name').value.trim();
    if(!name) return alert('請輸入客戶名稱');
    
    const index = parseInt(document.getElementById('edit-client-index').value);
    const taxId = document.getElementById('new-client-taxid').value.trim();
    const contact = document.getElementById('new-client-contact').value.trim();
    const phone = document.getElementById('new-client-phone').value.trim();
    const address = document.getElementById('new-client-address').value.trim();
    const staffsStr = document.getElementById('new-client-staffs').value.trim();
    const staffs = staffsStr ? staffsStr.split(/[，,]+/).map(s => s.trim()).filter(s => s) : [];
    
    const clientData = { name, taxId, contact, phone, address, staffs };

    if (index === -1) {
        clients.push(clientData);
    } else {
        const oldName = clients[index].name;
        records.forEach(r => { if(r.client === oldName) r.client = name; });
        clients[index] = clientData;
    }
    
    save(); 
    updateClientSelects();
    renderRecords();
    resetClientForm();
  }

  function resetClientForm() {
    document.getElementById('edit-client-index').value = "-1";
    ['new-client-name','new-client-taxid','new-client-contact','new-client-phone','new-client-address','new-client-staffs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('btn-save-client').innerText = "儲存客戶資料";
    document.getElementById('btn-save-client').classList.replace('bg-amber-600', 'bg-indigo-600');
  }

  function delClient(i){ if(confirm('⚠️ 刪除客戶將無法復原，確定嗎？')){ clients.splice(i,1); save(); updateClientSelects(); } }

  // --- 修改後的篩選與渲染函式 ---
  function renderRecords() {
    const m = document.getElementById('filter-month').value;
    const c = document.getElementById('filter-client').value;
    const staff = document.getElementById('filter-staff').value;
    const s = document.getElementById('filter-status').value;
    
    const data = records.filter(r => {
        // 基礎篩選
        const matchBasic = (!m || r.date.startsWith(m)) && 
                           (!c || r.client === c) && 
                           (!staff || r.staff === staff);
        
        // 狀態細分篩選
        let matchStatus = true;
        if (s === "not_invoiced") {
            // 未請款: 已請款為 false 且 未收
            matchStatus = (r.invoiced === false && r.paid === false);
        } else if (s === "invoiced_unpaid") {
            // 已請款未收款: 已請款為 true 且 未收
            matchStatus = (r.invoiced === true && r.paid === false);
        } else if (s === "paid") {
            // 已入帳
            matchStatus = (r.paid === true);
        }
        
        return matchBasic && matchStatus;
    }).sort((a,b) => new Date(b.date) - new Date(a.date));

    let totalQtyMeters = 0, totalAmount = 0, totalUnpaid = 0, totalInvoiced = 0;
    const lengthItems = ["PVC發泡踢腳板", "塑合木踢腳板", "牆毯收邊條", "U型墊", "上牆踢腳板", "6Cm", "8.5Cm", "10Cm"];

    const listHtml = data.map(r => {
      if(lengthItems.some(item => r.type.includes(item))) totalQtyMeters += r.qty;
      totalAmount += r.total;
      if(r.invoiced) totalInvoiced += r.total;
      if(!r.paid) totalUnpaid += r.total;
      
      return `
        <tr class="hover:bg-slate-50 transition group">
          <td class="p-4 font-medium text-slate-500">${r.date}</td>
          <td class="p-4">
            <div class="font-bold text-slate-800">${r.client}</div>
            <div class="text-[11px] text-indigo-500"><i class="fas fa-user mr-1"></i>${r.staff || '未設'} - <span class="text-slate-400">${r.site}</span></div>
          </td>
          <td class="p-4 text-xs font-bold text-slate-600">
            ${r.type}
            ${r.note ? `<div class="text-[10px] font-normal text-rose-500 mt-1"><i class="fas fa-comment-dots mr-1"></i>${r.note}</div>` : ''}
          </td>
          <td class="p-4 text-right">
            <div class="font-bold text-slate-700">${r.qty} <span class="text-[10px] text-slate-400">×</span></div>
            <div class="text-xs text-slate-400">$${r.price}</div>
          </td>
          <td class="p-4 text-right">
            <div class="font-black text-slate-800 text-base">$${r.total.toLocaleString()}</div>
          </td>
          <td class="p-4 text-center">
            <div class="flex flex-col gap-1 items-center">
              ${r.invoiced ? '<span class="status-invoiced">已請款</span>' : ''}
              <span class="${r.paid?'status-paid':'status-unpaid'}">${r.paid?'已入帳':'待收款'}</span>
            </div>
          </td>
          <td class="p-4 text-center">
            <div class="flex justify-center gap-1 opacity-20 group-hover:opacity-100 transition">
              <button onclick="editRec('${r.id}')" class="w-8 h-8 rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition"><i class="fas fa-edit text-xs"></i></button>
              <button onclick="delRec('${r.id}')" class="w-8 h-8 rounded-full bg-rose-50 text-rose-400 hover:bg-rose-500 hover:text-white transition"><i class="fas fa-trash-alt text-xs"></i></button>
            </div>
          </td>
        </tr>`;
    }).join('');

    document.getElementById('record-list').innerHTML = listHtml;
    document.getElementById('no-data').classList.toggle('hidden', data.length > 0);
    
    document.getElementById('stat-qty').innerText = totalQtyMeters.toLocaleString(undefined, {maximumFractionDigits: 1});
    document.getElementById('stat-total').innerText = totalAmount.toLocaleString();
    document.getElementById('stat-invoiced').innerText = totalInvoiced.toLocaleString();
    document.getElementById('stat-unpaid').innerText = totalUnpaid.toLocaleString();
  }

  function preparePrint(mode) {
    const m = document.getElementById('filter-month').value;
    const cName = document.getElementById('filter-client').value;
    const staffName = document.getElementById('filter-staff').value;
    
    const data = records.filter(r => (!m || r.date.startsWith(m)) && (!cName || r.client === cName) && (!staffName || r.staff === staffName)).sort((a,b) => new Date(a.date) - new Date(b.date));
    if(data.length === 0) return alert('⚠️ 目前篩選條件下沒有資料可供列印');
    document.getElementById('p-today').innerText = new Date().toLocaleDateString();
    let sum = 0; data.forEach(r => sum += r.total);
    
    if(mode === 'report') {
      document.getElementById('p-title').innerText = "工 程 明 細 報 表";
      document.getElementById('p-info').innerHTML = `<strong>對象：</strong>${cName || '全部'} | <strong>月份：</strong>${m || '全部'} | <strong>筆數：</strong>${data.length}`;
      document.getElementById('p-thead').innerHTML = `<tr><th>日期</th><th>施工內容(工務/工地/項目/備注)</th><th>數量</th><th>單價</th><th>合計</th></tr>`;
      document.getElementById('p-tbody').innerHTML = data.map(r => `<tr><td>${r.date}</td><td>${r.staff || ''} / ${r.site} / ${r.type} ${r.note ? `(${r.note})` : ''}</td><td>${r.qty}</td><td>${r.price}</td><td>${r.total.toLocaleString()}</td></tr>`).join('');
      document.getElementById('p-tfoot').innerHTML = `<tr><td colspan="4" style="text-align:right">總金額累計：</td><td style="font-size:18px;">$${sum.toLocaleString()}</td></tr>`;
      document.getElementById('p-footer-extra').innerHTML = "";
    } else {
      if(!cName) return alert('⚠️ 請先選擇單一「客戶」才能產生請款單！');
      const clientObj = clients.find(cl => cl.name === cName) || {name: cName};
      document.getElementById('p-title').innerText = "工 程 請 款 單";
      document.getElementById('p-info').innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 14px;">
            <div><strong>客戶名稱：</strong> ${clientObj.name}</div>
            <div><strong>統一編號：</strong> ${clientObj.taxId || '---'}</div>
            <div><strong>聯絡人員：</strong> ${clientObj.contact || '---'}</div>
            <div><strong>客戶電話：</strong> ${clientObj.phone || '---'}</div>
            <div style="grid-column: span 2;"><strong>客戶地址：</strong> ${clientObj.address || '---'}</div>
        </div>`;
      document.getElementById('p-thead').innerHTML = `<tr><th width="15%">日期</th><th width="45%">施工內容(工地/項目/備注)</th><th width="10%">數量</th><th width="10%">單位</th><th width="10%">單價</th><th width="10%">合計</th></tr>`;
      
      document.getElementById('p-tbody').innerHTML = data.map(r => { 
        let unit = "米"; 
        if(r.type === "補工") unit = "工";
        else if(r.type === "油資" || r.type === "住宿") unit = "式";
        
        return `<tr><td>${r.date}</td><td style="text-align:left">${r.staff || ''} / ${r.site} / ${r.type} ${r.note ? `<br><small style="color:#666">備注: ${r.note}</small>` : ''}</td><td>${r.qty}</td><td>${unit}</td><td>${r.price}</td><td>${r.total.toLocaleString()}</td></tr>`; 
      }).join('');
      
      document.getElementById('p-tfoot').innerHTML = `<tr><td colspan="5" style="text-align:right; padding: 15px;">總計應收金額：</td><td style="font-size:18px;">$${sum.toLocaleString()}</td></tr>`;
      document.getElementById('p-footer-extra').innerHTML = `
        <div style="margin-top:20px; border:2px solid #000; padding:15px; border-radius: 5px;">
            <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">新台幣大寫：${numberToChinese(sum)}</div>
            <div style="background: #f9f9f9; padding: 10px; border-top: 1px solid #ddd;">
                <p><strong>匯款帳號：</strong> 兆豐銀行 (017) 潭子分行</p>
                <p><strong>帳號：</strong> 028-131-441-69 &nbsp;&nbsp;&nbsp; <strong>戶名：</strong> 賴文正</p>
            </div>
        </div>
        <div style="margin-top:40px; display: flex; justify-content: flex-end; text-align: right; line-height: 2;">
            <div style="border-top: 1px solid #000; padding-top: 10px; min-width: 250px;">
                <p><strong>請款人：</strong> 賴文正</p>
                <p><strong>電話：</strong> 0926-223-329</p>
                <p><strong>地址：</strong> 台中市南區文心南路751號3樓之2</p>
            </div>
        </div>`;
    }
    window.print();
  }

  function numberToChinese(n) {
    const digit = ['零', '壹', '貳', '參', '肆', '伍', '陸', '柒', '捌', '玖'];
    const unit = [['元', '萬', '億'], ['', '拾', '佰', '仟']];
    let s = '整'; n = Math.floor(n);
    for (let i = 0; i < unit[0].length && n > 0; i++) {
        let p = ''; for (let j = 0; j < unit[1].length && n > 0; j++) { p = digit[n % 10] + unit[1][j] + p; n = Math.floor(n / 10); }
        s = p.replace(/(零.)*零$/, '').replace(/^$/, '零') + unit[0][i] + s;
    }
    return s.replace(/(零.)*零元/, '元').replace(/(零.)+/g, '零').replace(/^整$/, '零元整');
  }

  document.getElementById('record-form').onsubmit = function(e){
    e.preventDefault();
    const id = document.getElementById('edit-id').value || Date.now().toString();
    const q = parseFloat(document.getElementById('r-qty').value);
    const p = parseFloat(document.getElementById('r-price').value);
    
    const rec = { 
        id, 
        date: document.getElementById('r-date').value, 
        client: document.getElementById('r-client').value, 
        staff: document.getElementById('r-staff').value, 
        site: document.getElementById('r-site').value, 
        type: document.getElementById('r-type').value, 
        qty: q, 
        price: p, 
        total: Math.round(q * p), 
        paid: document.getElementById('r-paid').checked,
        invoiced: document.getElementById('r-invoiced').checked, 
        note: document.getElementById('r-note').value 
    };
    
    const idx = records.findIndex(r => r.id === id);
    if(idx > -1) records[idx] = rec; else records.push(rec);
    save(); closeModal('record-modal'); renderRecords();
  };

  function editRec(id){
    const r = records.find(r => r.id === id);
    document.getElementById('edit-id').value = r.id;
    document.getElementById('r-date').value = r.date;
    document.getElementById('r-client').value = r.client;
    syncStaffDropdown();
    document.getElementById('r-staff').value = r.staff || '';
    document.getElementById('r-site').value = r.site;
    document.getElementById('r-type').value = r.type;
    document.getElementById('r-qty').value = r.qty;
    document.getElementById('r-price').value = r.price;
    document.getElementById('r-paid').checked = r.paid;
    document.getElementById('r-invoiced').checked = r.invoiced || false; 
    document.getElementById('r-note').value = r.note || ''; 
    document.getElementById('r-total-display').innerText = r.total.toLocaleString();
    document.getElementById('record-modal').classList.remove('hidden');
  }

  function delRec(id){ if(confirm('確定要刪除這筆紀錄嗎？')){ records = records.filter(r => r.id !== id); save(); renderRecords(); } }
  
  function openRecordModal(){ 
    document.getElementById('record-form').reset(); 
    document.getElementById('edit-id').value = ''; 
    document.getElementById('r-date').valueAsDate = new Date(); 
    if(records.length > 0) document.getElementById('r-price').value = records[0].price;
    syncStaffDropdown(); 
    document.getElementById('record-modal').classList.remove('hidden'); 
  }
  
  function openClientModal(){ resetClientForm(); document.getElementById('client-modal').classList.remove('hidden'); }
  function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
  
  document.getElementById('r-qty').oninput = document.getElementById('r-price').oninput = function(){
    const q = parseFloat(document.getElementById('r-qty').value)||0;
    const p = parseFloat(document.getElementById('r-price').value)||0;
    document.getElementById('r-total-display').innerText = Math.round(q*p).toLocaleString();
  };

  function importData(input) {
    if(!confirm('匯入將會覆蓋目前的資料，建議先進行備份。確定繼續？')) return;
    const r = new FileReader(); r.onload = e => {
      try {
        const d = JSON.parse(e.target.result); 
        records=d.records; clients=d.clients; save(); 
        updateClientSelects(); renderRecords(); alert('✅ 資料已成功從備份檔恢復！');
      } catch(err) { alert('❌ 檔案格式錯誤，請確認是否為本系統的 JSON 備份檔。'); }
    }; r.readAsText(input.files[0]);
  }

  ['filter-month', 'filter-staff', 'filter-status'].forEach(id => {
    document.getElementById(id).onchange = renderRecords;
  });
</script>
