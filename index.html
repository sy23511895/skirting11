<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>踢腳板工程管理 - Mobile Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 80px; /* 為底部導航留空間 */
    }
    
    /* iPhone 底部安全區域補償 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

    .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    
    /* 狀態標籤樣式 */
    .status-badge { @apply px-2 py-0.5 rounded-full text-[10px] font-bold border; }
    .unpaid { @apply bg-red-50 text-red-600 border-red-100; }
    .paid { @apply bg-emerald-50 text-emerald-600 border-emerald-100; }
    .invoiced { @apply bg-blue-50 text-blue-600 border-blue-100; }

    /* 動畫 */
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-animate { animation: slideUp 0.3s ease-out; }

    @media print {
      .no-print { display: none !important; }
      body { padding: 0; }
    }
  </style>
</head>
<body class="bg-gray-50 text-slate-900">

  <header class="bg-slate-900 text-white p-4 sticky top-0 z-30 shadow-md">
    <div class="flex justify-between items-center mb-3">
      <h1 class="text-lg font-bold italic tracking-tight"><i class="fas fa-hammer mr-2 text-indigo-400"></i>SKIRTING PRO</h1>
      <span id="sync-status" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-green-400">● 已同步</span>
    </div>
    <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
      <div class="bg-slate-800 p-3 rounded-xl min-w-[120px]">
        <div class="text-[10px] text-slate-400">總額</div>
        <div class="text-lg font-bold">$<span id="stat-total">0</span></div>
      </div>
      <div class="bg-slate-800 p-3 rounded-xl min-w-[120px]">
        <div class="text-[10px] text-rose-400">待收</div>
        <div class="text-lg font-bold text-rose-400">$<span id="stat-unpaid">0</span></div>
      </div>
      <div class="bg-slate-800 p-3 rounded-xl min-w-[120px]">
        <div class="text-[10px] text-indigo-400">總長</div>
        <div class="text-lg font-bold"><span id="stat-qty">0</span><small class="text-xs ml-1 font-normal">M</small></div>
      </div>
    </div>
  </header>

  <main class="p-4">
    <details class="mb-4 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <summary class="p-4 list-none flex justify-between items-center font-bold text-sm text-slate-600">
        <span><i class="fas fa-filter mr-2"></i>條件篩選</span>
        <i class="fas fa-chevron-down text-xs"></i>
      </summary>
      <div class="p-4 pt-0 space-y-3">
        <input type="month" id="filter-month" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
        <select id="filter-client" onchange="updateFilterStaffs(); renderRecords();" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm"></select>
        <select id="filter-staff" onchange="renderRecords()" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm"></select>
        <select id="filter-status" onchange="renderRecords()" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm">
          <option value="">所有款項狀態</option>
          <option value="not_invoiced">❌ 未請款</option>
          <option value="invoiced_unpaid">⏳ 已請款(待領)</option>
          <option value="paid">✅ 已入帳</option>
        </select>
        <div class="flex gap-2">
            <button onclick="preparePrint('report')" class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-xs font-bold">印報表</button>
            <button onclick="preparePrint('invoice')" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-xs font-bold">請款單</button>
        </div>
      </div>
    </details>

    <div id="record-list" class="space-y-3">
      </div>
    
    <div id="no-data" class="hidden py-20 text-center">
        <i class="fas fa-box-open text-4xl text-slate-200 mb-2"></i>
        <p class="text-slate-400 text-sm">沒有相關紀錄</p>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 px-6 py-3 flex justify-between items-center z-40 pb-safe">
    <button onclick="renderRecords()" class="text-slate-400 flex flex-col items-center gap-1">
      <i class="fas fa-home text-xl text-indigo-600"></i>
      <span class="text-[10px] font-bold text-indigo-600">首頁</span>
    </button>
    <button onclick="openClientModal()" class="text-slate-400 flex flex-col items-center gap-1">
      <i class="fas fa-address-book text-xl"></i>
      <span class="text-[10px] font-bold text-slate-400">客戶管理</span>
    </button>
    <div class="relative -top-6">
      <button onclick="openRecordModal()" class="bg-indigo-600 text-white w-14 h-14 rounded-full shadow-lg shadow-indigo-200 border-4 border-white flex items-center justify-center">
        <i class="fas fa-plus text-xl"></i>
      </button>
    </div>
    <button onclick="exportData()" class="text-slate-400 flex flex-col items-center gap-1">
      <i class="fas fa-cloud-upload-alt text-xl"></i>
      <span class="text-[10px] font-bold text-slate-400">備份雲端</span>
    </button>
    <button onclick="location.reload()" class="text-slate-400 flex flex-col items-center gap-1">
      <i class="fas fa-sync text-xl"></i>
      <span class="text-[10px] font-bold text-slate-400">重新載入</span>
    </button>
  </nav>

  <div id="record-modal" class="fixed inset-0 bg-black/50 hidden z-50">
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[30px] p-6 modal-animate max-h-[90vh] overflow-y-auto">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">編輯施工紀錄</h3>
            <button onclick="closeModal('record-modal')" class="bg-slate-100 p-2 rounded-full w-8 h-8 flex items-center justify-center text-slate-400">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <form id="record-form" class="space-y-4">
            <input type="hidden" id="edit-id">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400">日期</label>
                    <input type="date" id="r-date" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm" required>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400">客戶</label>
                    <select id="r-client" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm" onchange="syncStaffDropdown()" required></select>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400">工務</label>
                    <select id="r-staff" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400">工地</label>
                    <input type="text" id="r-site" placeholder="工地名稱" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm" required>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400">施工類型</label>
                <select id="r-type" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm">
                    <option value="PVC發泡踢腳板">PVC發泡踢腳板</option>
                    <option value="塑合木踢腳板">塑合木踢腳板</option>
                    <option value="牆毯收邊條">牆毯收邊條</option>
                    <option value="U型墊">U型墊</option>
                    <option value="上牆踢腳板">上牆踢腳板</option>
                    <option value="補工">補工</option>
                    <option value="油資">油資</option>
                    <option value="住宿">住宿</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400">數量</label>
                    <input type="number" id="r-qty" step="0.01" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm" required>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-400">單價</label>
                    <input type="number" id="r-price" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm" required>
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400">備註</label>
                <input type="text" id="r-note" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm">
            </div>

            <div class="bg-indigo-50 p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <div class="text-[10px] text-indigo-400 font-bold uppercase">預估合計</div>
                    <div class="text-2xl font-black text-indigo-700">$ <span id="r-total-display">0</span></div>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="flex items-center text-xs font-bold text-slate-600">
                        <input type="checkbox" id="r-invoiced" class="mr-2 w-4 h-4 rounded"> 已請款
                    </label>
                    <label class="flex items-center text-xs font-bold text-slate-600">
                        <input type="checkbox" id="r-paid" class="mr-2 w-4 h-4 rounded text-emerald-600"> 已收款
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">儲存紀錄</button>
            <div class="h-6"></div>
        </form>
    </div>
  </div>

  <div id="client-modal" class="fixed inset-0 bg-black/50 hidden z-50">
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[30px] p-6 modal-animate max-h-[90vh] overflow-y-auto">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">客戶管理</h3>
            <button onclick="closeModal('client-modal')" class="bg-slate-100 p-2 rounded-full"><i class="fas fa-times text-slate-400"></i></button>
        </div>

        <div class="space-y-4 mb-8">
            <input type="hidden" id="edit-client-index" value="-1">
            <input type="text" id="new-client-name" placeholder="客戶公司名稱" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm font-bold">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="new-client-taxid" placeholder="統編" class="bg-gray-50 border-0 p-3 rounded-xl text-sm">
                <input type="text" id="new-client-phone" placeholder="電話" class="bg-gray-50 border-0 p-3 rounded-xl text-sm">
            </div>
            <textarea id="new-client-staffs" placeholder="工務名單 (逗號隔開)" class="w-full bg-gray-50 border-0 p-3 rounded-xl text-sm" rows="2"></textarea>
            <button onclick="addClient()" id="btn-save-client" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">儲存客戶</button>
        </div>

        <div class="space-y-2" id="client-ui-list">
            </div>
        <div class="mt-6 flex justify-center">
            <input type="file" id="import-file" class="hidden" onchange="importData(this)">
            <button onclick="document.getElementById('import-file').click()" class="text-xs text-slate-400 underline">匯入備份檔</button>
        </div>
        <div class="h-10"></div>
    </div>
  </div>

  <div id="print-area" class="hidden">
    <div class="report-header text-center p-8">
        <h2 id="p-title" class="text-2xl font-bold underline decoration-double">工程明細報表</h2>
        <p class="mt-2 font-bold">日期：<span id="p-today"></span></p>
    </div>
    <div id="p-info" class="mb-4 text-sm border p-4 rounded"></div>
    <table class="w-full border-collapse border text-xs">
        <thead id="p-thead"></thead>
        <tbody id="p-tbody"></tbody>
        <tfoot id="p-tfoot" class="font-bold"></tfoot>
    </table>
    <div id="p-footer-extra" class="mt-4"></div>
  </div>

<script>
  // --- 原始邏輯保留與移動端渲染優化 ---
  const cloudUrl = "https://script.google.com/macros/s/AKfycbz1lPnQ8R4ouOpKLfi4kt28vJeEy3ziWRkEdWAyn9j13cV6QCyGZ7g7GaQB5nO4E-Y6/exec"; 
  let records = [];
  let clients = [];

  window.onload = async function() {
    const today = new Date();
    document.getElementById('filter-month').value = today.toISOString().slice(0, 7);
    loadLocal();
    if(cloudUrl.includes("exec")) {
        try {
            const response = await fetch(cloudUrl);
            const data = await response.json();
            if(data.records) { 
                records = data.records; 
                clients = data.clients; 
                saveLocal(); 
                document.getElementById('sync-status').innerText = "● 雲端已同步";
            }
        } catch (e) { document.getElementById('sync-status').innerText = "● 離線模式"; }
    }
    updateClientSelects();
    renderRecords();
  };

  function loadLocal() {
    records = JSON.parse(localStorage.getItem('SKIRTING_V6')) || [];
    clients = JSON.parse(localStorage.getItem('CLIENT_V6')) || [{name: "預設客戶", staffs: []}];
  }

  function saveLocal() {
    localStorage.setItem('SKIRTING_V6', JSON.stringify(records)); 
    localStorage.setItem('CLIENT_V6', JSON.stringify(clients)); 
  }

  function save() {
    saveLocal();
    if(cloudUrl.includes("exec")) {
        fetch(cloudUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({records, clients}) });
    }
  }

  function renderRecords() {
    const m = document.getElementById('filter-month').value;
    const c = document.getElementById('filter-client').value;
    const staff = document.getElementById('filter-staff').value;
    const s = document.getElementById('filter-status').value;
    
    const data = records.filter(r => {
        const matchBasic = (!m || r.date.startsWith(m)) && (!c || r.client === c) && (!staff || r.staff === staff);
        let matchStatus = true;
        if (s === "not_invoiced") matchStatus = (!r.invoiced && !r.paid);
        else if (s === "invoiced_unpaid") matchStatus = (r.invoiced && !r.paid);
        else if (s === "paid") matchStatus = (r.paid);
        return matchBasic && matchStatus;
    }).sort((a,b) => new Date(b.date) - new Date(a.date));

    let totalQty = 0, totalAmount = 0, totalUnpaid = 0;
    const listHtml = data.map(r => {
        totalAmount += r.total;
        if(!r.paid) totalUnpaid += r.total;
        if(["PVC發泡踢腳板", "塑合木踢腳板", "牆毯收邊條", "U型墊", "上牆踢腳板"].some(t => r.type.includes(t))) totalQty += r.qty;

        return `
        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm active:scale-[0.98] transition-transform" onclick="editRec('${r.id}')">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <span class="text-[10px] font-bold text-slate-400">${r.date}</span>
                    <h4 class="font-bold text-slate-800">${r.site}</h4>
                    <p class="text-[11px] text-slate-500">${r.client} · ${r.staff || '無工務'}</p>
                </div>
                <div class="text-right">
                    <div class="font-black text-indigo-600">$${r.total.toLocaleString()}</div>
                    <div class="text-[10px] text-slate-400">${r.qty} x $${r.price}</div>
                </div>
            </div>
            <div class="flex justify-between items-center pt-2 border-t border-slate-50">
                <span class="text-xs font-medium text-slate-600"><i class="fas fa-tag mr-1 text-slate-300"></i>${r.type}</span>
                <div class="flex gap-1">
                    ${r.invoiced ? '<span class="status-badge invoiced">已請</span>' : ''}
                    <span class="status-badge ${r.paid?'paid':'unpaid'}">${r.paid?'已入帳':'未收款'}</span>
                </div>
            </div>
            ${r.note ? `<div class="mt-2 text-[10px] bg-rose-50 text-rose-500 p-1 px-2 rounded-lg">${r.note}</div>` : ''}
        </div>`;
    }).join('');

    document.getElementById('record-list').innerHTML = listHtml;
    document.getElementById('no-data').classList.toggle('hidden', data.length > 0);
    document.getElementById('stat-qty').innerText = totalQty.toFixed(1);
    document.getElementById('stat-total').innerText = totalAmount.toLocaleString();
    document.getElementById('stat-unpaid').innerText = totalUnpaid.toLocaleString();
  }

  // 其他原有 JS 邏輯 (Client 管理, Save, Export, Print 等) 保持不變，但將 UI 元件對應到新的 ID
  function openRecordModal(){ 
    document.getElementById('record-form').reset(); 
    document.getElementById('edit-id').value = ''; 
    document.getElementById('r-date').valueAsDate = new Date(); 
    syncStaffDropdown(); 
    document.getElementById('record-modal').classList.remove('hidden'); 
  }

  function editRec(id){
    const r = records.find(r => r.id === id);
    document.getElementById('edit-id').value = r.id;
    document.getElementById('r-date').value = r.date;
    document.getElementById('r-client').value = r.client;
    syncStaffDropdown();
    document.getElementById('r-staff').value = r.staff || '';
    document.getElementById('r-site').value = r.site;
    document.getElementById('r-type').value = r.type;
    document.getElementById('r-qty').value = r.qty;
    document.getElementById('r-price').value = r.price;
    document.getElementById('r-paid').checked = r.paid;
    document.getElementById('r-invoiced').checked = r.invoiced || false; 
    document.getElementById('r-note').value = r.note || ''; 
    document.getElementById('r-total-display').innerText = r.total.toLocaleString();
    document.getElementById('record-modal').classList.remove('hidden');
  }

  function updateClientSelects() {
    const html = clients.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    document.getElementById('filter-client').innerHTML = '<option value="">所有客戶</option>' + html;
    document.getElementById('r-client').innerHTML = html;
    
    document.getElementById('client-ui-list').innerHTML = clients.map((c,i) => `
      <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
        <div>
            <div class="font-bold text-sm">${c.name}</div>
            <div class="text-[10px] text-slate-400">工務: ${(c.staffs || []).join(', ') || '未設定'}</div>
        </div>
        <div class="flex gap-2">
            <button onclick="editClient(${i})" class="text-indigo-500 w-8 h-8 bg-white rounded-full shadow-sm"><i class="fas fa-edit text-xs"></i></button>
            <button onclick="delClient(${i})" class="text-rose-400 w-8 h-8 bg-white rounded-full shadow-sm"><i class="fas fa-trash-alt text-xs"></i></button>
        </div>
      </div>`).join('');
    syncStaffDropdown();
    updateFilterStaffs();
  }

  function syncStaffDropdown() {
    const clientName = document.getElementById('r-client').value;
    const clientObj = clients.find(c => c.name === clientName);
    const staffSelect = document.getElementById('r-staff');
    if (clientObj && clientObj.staffs && clientObj.staffs.length > 0) {
      staffSelect.innerHTML = clientObj.staffs.map(s => `<option value="${s}">${s}</option>`).join('');
    } else { staffSelect.innerHTML = '<option value="">無資料</option>'; }
  }

  function updateFilterStaffs() {
    const clientName = document.getElementById('filter-client').value;
    const filterStaffSelect = document.getElementById('filter-staff');
    if (!clientName) { filterStaffSelect.innerHTML = '<option value="">請先選客戶</option>'; return; }
    const clientObj = clients.find(c => c.name === clientName);
    if (clientObj && clientObj.staffs && clientObj.staffs.length > 0) {
      filterStaffSelect.innerHTML = '<option value="">所有工務</option>' + clientObj.staffs.map(s => `<option value="${s}">${s}</option>`).join('');
    } else { filterStaffSelect.innerHTML = '<option value="">無工務資料</option>'; }
  }

  document.getElementById('record-form').onsubmit = function(e){
    e.preventDefault();
    const id = document.getElementById('edit-id').value || Date.now().toString();
    const q = parseFloat(document.getElementById('r-qty').value);
    const p = parseFloat(document.getElementById('r-price').value);
    const rec = { 
        id, 
        date: document.getElementById('r-date').value, 
        client: document.getElementById('r-client').value, 
        staff: document.getElementById('r-staff').value, 
        site: document.getElementById('r-site').value, 
        type: document.getElementById('r-type').value, 
        qty: q, price: p, total: Math.round(q * p), 
        paid: document.getElementById('r-paid').checked,
        invoiced: document.getElementById('r-invoiced').checked, 
        note: document.getElementById('r-note').value 
    };
    const idx = records.findIndex(r => r.id === id);
    if(idx > -1) records[idx] = rec; else records.push(rec);
    save(); closeModal('record-modal'); renderRecords();
  };

  async function exportData() {
    if(!confirm("確定要備份到雲端並下載檔案嗎？")) return;
    try {
        await fetch(cloudUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({records, clients}) });
        const blob = new Blob([JSON.stringify({records, clients}, null, 2)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `工程備份_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        alert("✅ 雲端備份完成");
    } catch (e) { alert("❌ 同步失敗"); }
  }

  function addClient(){
    const name = document.getElementById('new-client-name').value.trim();
    if(!name) return alert('請輸入名稱');
    const index = parseInt(document.getElementById('edit-client-index').value);
    const staffsStr = document.getElementById('new-client-staffs').value.trim();
    const staffs = staffsStr ? staffsStr.split(/[，,]+/).map(s => s.trim()).filter(s => s) : [];
    const clientData = { 
        name, 
        taxId: document.getElementById('new-client-taxid').value, 
        phone: document.getElementById('new-client-phone').value, 
        staffs 
    };
    if (index === -1) clients.push(clientData);
    else clients[index] = clientData;
    save(); updateClientSelects(); renderRecords();
    document.getElementById('new-client-name').value = "";
    document.getElementById('edit-client-index').value = "-1";
  }

  function editClient(index) {
    const c = clients[index];
    document.getElementById('edit-client-index').value = index;
    document.getElementById('new-client-name').value = c.name;
    document.getElementById('new-client-taxid').value = c.taxId || '';
    document.getElementById('new-client-phone').value = c.phone || '';
    document.getElementById('new-client-staffs').value = (c.staffs || []).join(', ');
    document.getElementById('btn-save-client').innerText = "更新客戶";
  }

  function delClient(i){ if(confirm('確定刪除？')){ clients.splice(i,1); save(); updateClientSelects(); } }
  function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
  function openClientModal(){ document.getElementById('client-modal').classList.remove('hidden'); }

  // 計算金額連動
  document.getElementById('r-qty').oninput = document.getElementById('r-price').oninput = function(){
    const q = parseFloat(document.getElementById('r-qty').value)||0;
    const p = parseFloat(document.getElementById('r-price').value)||0;
    document.getElementById('r-total-display').innerText = Math.round(q*p).toLocaleString();
  };

  // 報表功能 (保持原樣，因為列印通常在電腦或特定環境)
  function preparePrint(mode) {
    const m = document.getElementById('filter-month').value;
    const cName = document.getElementById('filter-client').value;
    const data = records.filter(r => (!m || r.date.startsWith(m)) && (!cName || r.client === cName)).sort((a,b) => new Date(a.date) - new Date(b.date));
    if(data.length === 0) return alert('無資料');
    
    document.getElementById('p-today').innerText = new Date().toLocaleDateString();
    let sum = 0; data.forEach(r => sum += r.total);
    
    if(mode === 'report') {
        document.getElementById('p-title').innerText = "工 程 明 細 報 表";
        document.getElementById('p-thead').innerHTML = `<tr><th>日期</th><th>施工內容</th><th>數量</th><th>合計</th></tr>`;
        document.getElementById('p-tbody').innerHTML = data.map(r => `<tr><td border="1">${r.date}</td><td>${r.site}/${r.type}</td><td>${r.qty}</td><td>${r.total}</td></tr>`).join('');
    } else {
        if(!cName) return alert('請先選單一客戶');
        document.getElementById('p-title').innerText = "工 程 請 款 單";
        document.getElementById('p-tbody').innerHTML = data.map(r => `<tr><td>${r.date}</td><td>${r.site}/${r.type}</td><td>${r.qty}</td><td>${r.total}</td></tr>`).join('');
    }
    window.print();
  }

  function importData(input) {
    const r = new FileReader(); r.onload = e => {
      try {
        const d = JSON.parse(e.target.result); 
        records=d.records; clients=d.clients; save(); 
        updateClientSelects(); renderRecords(); alert('恢復成功');
      } catch(err) { alert('格式錯誤'); }
    }; r.readAsText(input.files[0]);
  }
</script>
</body>
</html>
