<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程請款單 - 三興行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; margin: 0; }
        
        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }
            body { 
                background-color: white !important; 
            }
            .no-print { display: none !important; } 
            
            .print-container { 
                width: 210mm;
                height: 296mm;
                max-height: 296mm;
                margin: 0 auto !important; 
                padding: 15mm !important; 
                box-shadow: none !important; 
                border: none !important;
                display: flex !important;
                flex-direction: column !important;
            }
        }

        .flex-grow-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .invoice-table th { background-color: #f8fafc; border-bottom: 2px solid #334155; padding: 10px 8px; }
        .invoice-table td { border: 1px solid #e2e8f0; padding: 10px 8px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto mb-6 flex justify-end gap-3 no-print">
        <button onclick="window.close()" class="bg-slate-500 text-white px-6 py-2 rounded-lg hover:bg-slate-600 shadow-md transition font-bold text-sm">
            <i class="fas fa-times mr-2"></i>返回系統 / 關閉
        </button>
        <button onclick="window.print()" class="bg-indigo-600 text-white px-8 py-2 rounded-lg hover:bg-indigo-700 shadow-lg transition font-bold text-sm">
            <i class="fas fa-print mr-2"></i>確認列印 / 另存 PDF
        </button>
    </div>

    <div class="print-container max-w-4xl mx-auto bg-white p-10 sm:p-16 shadow-2xl rounded-sm min-h-[1050px] flex flex-col">
        
        <div class="flex justify-between items-start border-b-4 border-slate-800 pb-4 mb-6 shrink-0">
            <div>
                <h1 class="text-4xl font-black tracking-[0.4em] text-slate-800 mb-2">工程請款單</h1>
                <div class="inline-block bg-slate-100 px-3 py-1 rounded-full text-sm font-bold text-slate-600">
                    工程施作區間：<span id="work-range">--</span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs font-bold text-slate-400">對帳單號</div>
                <div class="text-lg font-black text-slate-700" id="invoice-no">INV-00000000</div>
                <div class="text-slate-500 text-xs mt-1">製單日期：<span id="current-date"></span></div>
            </div>
        </div>

        <div class="mb-8 shrink-0">
            <div class="space-y-2">
                <div id="c-name" class="font-black text-2xl text-slate-800">客戶公司名稱</div>
                <div class="text-slate-600 text-[14px] space-y-1">
                    <p>統一編號：<span id="c-taxid">--</span></p>
                    <p>聯絡地址：<span id="c-address">--</span></p>
                    <p class="pt-2 font-bold text-lg text-slate-900 border-t border-dashed border-slate-200 mt-2">工地名稱：<span id="c-site-display">--</span></p>
                </div>
            </div>
        </div>

        <div class="flex-grow-area">
            <table class="w-full invoice-table text-left">
                <thead>
                    <tr class="text-slate-700 text-[14px] font-bold">
                        <th class="w-12 text-center">項次</th>
                        <th class="w-32 text-center">施工日期</th>
                        <th>項目（備註）</th>
                        <th class="w-20 text-right">數量</th>
                        <th class="w-24 text-right">單價</th>
                        <th class="w-32 text-right">小計</th>
                    </tr>
                </thead>
                <tbody id="invoice-body" class="text-slate-700 text-[14px]">
                </tbody>
            </table>
            <div class="flex-grow min-h-[20px]"></div>
        </div>

        <div class="flex justify-end mt-6 mb-8 shrink-0">
            <div class="w-64 space-y-2 text-right border-t-2 border-slate-100 pt-4">
                <div class="flex justify-between text-slate-600 font-bold text-sm">
                    <span>工程總額</span>
                    <span id="sum-base">$0</span>
                </div>
                <div class="flex justify-between text-slate-400 text-xs">
                    <span>營業稅 (5%)</span>
                    <span id="sum-tax">$0</span>
                </div>
                <div class="flex justify-between text-2xl font-black text-indigo-900 border-t-4 border-slate-800 pt-2 mt-2">
                    <span>應收總計</span>
                    <span id="sum-grand">$0</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-8 border-t border-slate-100 pt-8 shrink-0">
            <div class="col-span-3 text-left">
                <h4 class="font-black text-slate-800 mb-3 flex items-center text-sm">
                    <i class="fas fa-university mr-2 text-indigo-500"></i>匯款帳戶資訊
                </h4>
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 text-[15px] text-slate-600 space-y-2">
                    <p class="font-bold">銀行名稱：<span class="text-slate-900">兆豐銀⾏(017)潭⼦分⾏</span></p>
                    <p class="font-bold">戶　　名：<span class="text-slate-900 text-lg">賴文正</span></p>
                    <p class="font-bold">帳戶號碼：<span class="text-slate-900 font-black tracking-wider text-lg">028-131-441-69</span></p>
                </div>
            </div>
            <div class="col-span-2 flex flex-col items-end text-right">
                <div class="space-y-1.5">
                    <div class="text-2xl font-black text-slate-800">三興行</div>
                    <p class="text-[14px] text-indigo-700 font-black">統一編號：09300160</p>
                    <p class="text-[13px] text-slate-600 font-medium">地址：台中市南區文心南路751號3樓之2</p>
                    <p class="text-[13px] text-slate-600 font-medium">聯絡人：賴文正</p>
                    <p class="text-[14px] text-indigo-700 font-black">電話：0926-223-329</p>
                </div>
            </div>
        </div>

        <div class="mt-10 text-center shrink-0 border-t border-slate-50 pt-4">
            <p class="text-sm font-bold text-slate-400 tracking-[0.5em] uppercase">感謝您的支持與合作</p>
        </div>
    </div>

    <script>
        window.onload = function() {
            const now = new Date();
            document.getElementById('current-date').innerText = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
            document.getElementById('invoice-no').innerText = `INV-${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}`;

            const data = JSON.parse(sessionStorage.getItem('INVOICE_DATA'));
            if (!data) return;

            document.getElementById('work-range').innerText = data.workRange || "";
            document.getElementById('c-name').innerText = data.clientInfo.name;
            
            // 修正點：將 data.clientInfo.taxid 改為 data.clientInfo.tax 以匹配 index3.html 的資料結構
            document.getElementById('c-taxid').innerText = data.clientInfo.tax || '--';
            document.getElementById('c-address').innerText = data.clientInfo.address || '--';
            
            if (data.items.length > 0) {
                document.getElementById('c-site-display').innerText = data.items[0].site;
            }

            let totalBase = 0;
            const tbody = document.getElementById('invoice-body');
            
            tbody.innerHTML = data.items.map((r, index) => {
                totalBase += r.total;
                const noteText = r.note ? ` <span class="text-slate-400 text-[12px] block mt-1">${r.note}</span>` : '';
                return `
                    <tr class="hover:bg-slate-50">
                        <td class="text-center text-slate-400 font-bold">${index + 1}</td>
                        <td class="text-center font-medium">${r.date}</td>
                        <td class="font-bold text-slate-800 text-[15px]">${r.type}${noteText}</td>
                        <td class="text-right font-bold text-[15px]">${r.qty.toLocaleString()}</td>
                        <td class="text-right text-slate-500">$${r.price.toLocaleString()}</td>
                        <td class="text-right font-black text-slate-900 text-[16px]">$${r.total.toLocaleString()}</td>
                    </tr>
                `;
            }).join('');

            const tax = Math.round(totalBase * 0.05);
            document.getElementById('sum-base').innerText = '$' + totalBase.toLocaleString();
            document.getElementById('sum-tax').innerText = '$' + tax.toLocaleString();
            document.getElementById('sum-grand').innerText = '$' + (totalBase + tax).toLocaleString();
        };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
